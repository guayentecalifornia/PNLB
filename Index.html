
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080C10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PLNB">
<title>PLNB</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#080C10;font-family:monospace;color:#E8F4F8}
button{cursor:pointer;font-family:monospace;border:none;outline:none}
textarea,input{font-family:monospace;outline:none;border:none}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:#1E2D3D}
#root{position:fixed;inset:0;display:flex;flex-direction:column;background:#080C10}
#topbar{background:#0E1419;border-bottom:1px solid #1E2D3D;padding:14px 16px 10px;flex-shrink:0}
.wordmark{font-size:28px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,#00E5FF,#FFD166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:#5A7A8A;font-size:10px;letter-spacing:2px;margin-top:1px}
#tabbar{display:flex;background:#080C10;border-bottom:1px solid #1E2D3D;flex-shrink:0}
.tab{flex:1;padding:10px 4px;background:none;font-size:9px;letter-spacing:1px;color:#5A7A8A;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#00E5FF;border-bottom:2px solid #00E5FF}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;padding-bottom:20px}
.card{background:#131B22;border:1px solid #1E2D3D;border-radius:12px;padding:14px;margin-bottom:10px}
.job-card{background:#131B22;border:1px solid #1E2D3D;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;border-left:3px solid #00E5FF}
.comp{display:inline-block;background:#FFD16622;color:#FFD166;border:1px solid #FFD16640;border-radius:4px;padding:3px 9px;font-size:11px;font-weight:700}
.sbadge{display:inline-flex;align-items:center;gap:3px;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700}
.tag{display:inline-block;background:#1E2D3D;color:#8AAABB;border-radius:3px;padding:2px 6px;font-size:9px;margin:2px 2px 0 0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:#131B22;border:1px solid #1E2D3D;border-radius:10px;padding:8px 4px;text-align:center}
.stat-n{font-size:20px;font-weight:800}
.stat-l{font-size:9px;color:#5A7A8A;letter-spacing:1px;margin-top:2px}
.agent-box{background:#131B22;border:1px solid #1E2D3D;border-radius:14px;padding:16px;margin-bottom:12px}
.run-btn{background:linear-gradient(135deg,#00E5FF,#0099BB);border-radius:10px;padding:11px 18px;color:#080C10;font-size:12px;font-weight:800;box-shadow:0 4px 16px #00E5FF33}
.run-btn:disabled{background:#1E2D3D;color:#5A7A8A;box-shadow:none}
.log{background:#0E1419;border-radius:8px;padding:10px;font-size:11px;max-height:100px;overflow-y:auto;margin-top:10px;display:none}
#detail{position:fixed;inset:0;background:#080C10;z-index:50;display:none;overflow-y:auto}
.dbar{position:sticky;top:0;background:#080C10;border-bottom:1px solid #1E2D3D;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:10}
.back{background:#0E1419;border:1px solid #1E2D3D;color:#E8F4F8;border-radius:8px;padding:6px 12px;font-size:15px}
#modal{position:fixed;inset:0;background:#000000CC;z-index:100;display:none;align-items:flex-end;justify-content:center}
.msheet{background:#131B22;border:1px solid #1E2D3D;border-radius:18px 18px 0 0;width:100%;max-height:82vh;display:flex;flex-direction:column}
.mhandle{width:36px;height:4px;background:#1E2D3D;border-radius:2px;margin:12px auto 0}
.mbody{flex:1;overflow-y:auto;padding:16px;font-size:13px;line-height:1.8;color:#E8F4F8;white-space:pre-wrap}
textarea{width:100%;background:#0E1419;border:1px solid #1E2D3D;border-radius:8px;color:#E8F4F8;padding:10px;font-size:12px;line-height:1.6;resize:vertical}
input[type=text]{width:100%;background:#0E1419;border:1px solid #1E2D3D;border-radius:8px;color:#E8F4F8;padding:10px;font-size:12px}
.pill{border-radius:20px;padding:5px 12px;font-size:10px;border:1px solid;white-space:nowrap;margin:3px;transition:all .2s;background:transparent;color:#5A7A8A;border-color:#1E2D3D}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.fade{animation:fade .25s ease}
.ibanner{background:linear-gradient(135deg,#00E5FF11,#FFD16611);border:1px solid #00E5FF25;border-radius:12px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:11px}
.section-lbl{color:#5A7A8A;font-size:10px;letter-spacing:2px;padding-bottom:8px;border-bottom:1px solid #1E2D3D;margin-bottom:10px}
</style>
</head>
<body>
<div id="root">
  <div id="topbar">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div class="wordmark">PLNB</div>
        <div class="subtitle">EXEC SEARCH · BAY AREA · $2M+</div>
      </div>
      <div id="datebadge" style="background:#00E5FF18;border:1px solid #00E5FF35;border-radius:8px;padding:5px 10px;color:#00E5FF;font-size:11px"></div>
    </div>
  </div>
  <div id="tabbar"></div>
  <div id="content"></div>
</div>
<div id="detail"></div>
<div id="modal" style="display:none">
  <div class="msheet">
    <div class="mhandle"></div>
    <div id="mhead" style="padding:14px 16px;border-bottom:1px solid #1E2D3D;display:flex;justify-content:space-between;align-items:flex-start"></div>
    <div id="mbody" class="mbody"></div>
    <div id="mfoot" style="padding:10px 14px;border-top:1px solid #1E2D3D;display:flex;gap:8px"></div>
  </div>
</div>
<script>
var today=new Date().toISOString().split('T')[0];
var yday=new Date(Date.now()-864e5).toISOString().split('T')[0];
var dday=new Date(Date.now()-1728e5).toISOString().split('T')[0];
var ST={new:{l:'New',c:'#00E5FF',i:'✦'},applied:{l:'Applied',c:'#FFA552',i:'◈'},contacted:{l:'Contacted',c:'#FFD166',i:'◉'},interview:{l:'Interview',c:'#06D6A0',i:'▲'},offer:{l:'Offer',c:'#A855F7',i:'★'},declined:{l:'Declined',c:'#EF476F',i:'✕'}};
var SEED=[
{id:1,date:today,status:'new',title:'Chief Technology Officer',company:'Anthropic',comp:'$2.4M',location:'San Francisco, CA',source:'LinkedIn',tags:['AI','C-Suite','Series E'],cn:'Dario Amodei',cr:'CEO',cl:'linkedin.com/in/darioamodei',summary:'Lead all engineering for a frontier AI safety company. Define 3-year technical roadmap and oversee 300+ eng org.',cv:false,lt:false,notes:''},
{id:2,date:today,status:'applied',title:'VP Engineering, Platform',company:'Stripe',comp:'$2.1M',location:'San Francisco, CA',source:'Levels.fyi',tags:['Fintech','VP','Pre-IPO'],cn:'Will Gaybrick',cr:'President',cl:'linkedin.com/in/willgaybrick',summary:'Own payments infrastructure for 500K+ businesses. Scale distributed systems to 99.999% SLA.',cv:true,lt:true,notes:'Applied via referral. Follow up in 5 days.'},
{id:3,date:today,status:'interview',title:'SVP Product & Engineering',company:'Figma',comp:'$3.2M',location:'San Francisco, CA',source:'Company Site',tags:['Design-Tech','SVP','Public'],cn:'Dylan Field',cr:'CEO',cl:'linkedin.com/in/dylanfield',summary:'Define product strategy for 8M+ users. Lead engineering and design culture post-Adobe.',cv:true,lt:true,notes:'Panel interview March 28. Prep case study.'},
{id:4,date:yday,status:'contacted',title:'Chief Product Officer',company:'Notion',comp:'$2.7M',location:'San Francisco, CA',source:'LinkedIn',tags:['SaaS','C-Suite','Series C'],cn:'Ivan Zhao',cr:'CEO',cl:'linkedin.com/in/ivanzhaon',summary:'Lead product vision for the all-in-one workspace. Drive AI roadmap and enterprise growth.',cv:true,lt:false,notes:'Sent LinkedIn message. Awaiting reply.'},
{id:5,date:yday,status:'new',title:'VP Engineering, Infrastructure',company:'Databricks',comp:'$2.3M',location:'San Francisco, CA',source:'Glassdoor',tags:['Data/AI','VP','Series I'],cn:'Ali Ghodsi',cr:'CEO',cl:'linkedin.com/in/alighodsi',summary:'Own lakehouse architecture at hyperscale. Manage 200-person infra org across 4 time zones.',cv:false,lt:false,notes:''},
{id:6,date:dday,status:'offer',title:'CTO, AI Products',company:'Salesforce',comp:'$4.1M',location:'San Francisco, CA',source:'Recruiter',tags:['Enterprise','C-Suite','Public'],cn:'Marc Benioff',cr:'CEO',cl:'linkedin.com/in/marcbenioff',summary:'Lead Einstein AI platform strategy. Integrate LLM capabilities across the full Salesforce cloud.',cv:true,lt:true,notes:'Offer! $800K base + $3.3M RSU. Deadline April 4.'}
];
var APP={tab:0,jobs:[],profile:{name:'',bio:''},filter:null,selId:null,aiMode:null,running:false,logs:[]};
function save(){try{localStorage.setItem('plnb2_j',JSON.stringify(APP.jobs));localStorage.setItem('plnb2_p',JSON.stringify(APP.profile));}catch(e){}}
function load(){try{var j=localStorage.getItem('plnb2_j');var p=localStorage.getItem('plnb2_p');if(j)APP.jobs=JSON.parse(j);else APP.jobs=JSON.parse(JSON.stringify(SEED));if(p)APP.profile=JSON.parse(p);}catch(e){APP.jobs=JSON.parse(JSON.stringify(SEED));}}
function sbadge(s,sm){var m=ST[s]||ST.new;var sz=sm?'font-size:10px;padding:2px 6px':'font-size:11px;padding:3px 8px';return'<span class="sbadge" style="background:'+m.c+'18;color:'+m.c+';border:1px solid '+m.c+'40;'+sz+'">'+m.i+' '+m.l+'</span>';}
function fdate(d){var dt=new Date(d+'T12:00:00'),now=new Date();now.setHours(0,0,0,0);var diff=Math.round((now-dt)/864e5);if(diff===0)return'TODAY';if(diff===1)return'YESTERDAY';return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();}
function stats(){return{tot:APP.jobs.length,act:APP.jobs.filter(function(j){return j.status!=='declined'}).length,int:APP.jobs.filter(function(j){return j.status==='interview'}).length,off:APP.jobs.filter(function(j){return j.status==='offer'}).length};}
function getJob(id){return APP.jobs.filter(function(j){return j.id===id})[0];}
function statsHtml(){var s=stats();var items=[{l:'TOTAL',v:s.tot,c:'#00E5FF'},{l:'ACTIVE',v:s.act,c:'#06D6A0'},{l:'INTRVW',v:s.int,c:'#FFD166'},{l:'OFFERS',v:s.off,c:'#A855F7'}];return'<div class="stats">'+items.map(function(it){return'<div class="stat"><div class="stat-n" style="color:'+it.c+'">'+it.v+'</div><div class="stat-l">'+it.l+'</div></div>';}).join('')+'</div>';}
function jobHtml(j){var m=ST[j.status]||ST.new;var bx='';if(j.cv)bx+='<span style="color:#06D6A0;font-size:9px;background:#06D6A018;border:1px solid #06D6A030;border-radius:3px;padding:1px 5px">CV✓</span> ';if(j.lt)bx+='<span style="color:#FFD166;font-size:9px;background:#FFD16618;border:1px solid #FFD16630;border-radius:3px;padding:1px 5px">Ltr✓</span> ';if(j.notes)bx+='<span style="color:#5A7A8A;font-size:10px">📝</span>';return'<div class="job-card" style="border-left-color:'+m.c+'" onclick="openJob('+j.id+')">'+'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">'+'<div style="flex:1;min-width:0">'+'<div style="color:#E8F4F8;font-size:14px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+j.title+'</div>'+'<div style="color:#8AAABB;font-size:12px;margin-bottom:8px">'+j.company+' · '+j.location+'</div>'+'<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'+'<span class="comp">'+j.comp+' TC</span>'+sbadge(j.status,true)+'</div></div>'+'<div style="color:#5A7A8A;font-size:18px">›</div></div>'+'<div style="margin-top:8px">'+j.tags.map(function(t){return'<span class="tag">'+t+'</span>';}).join('')+'</div>'+'<div style="display:flex;align-items:center;gap:4px;margin-top:8px;flex-wrap:wrap">'+bx+'<span style="margin-left:auto;color:#5A7A8A;font-size:9px">'+j.source+'</span></div>'+'</div>';}
var TABS=[{l:'TODAY',i:'◎'},{l:'HISTORY',i:'☰'},{l:'PIPELINE',i:'▲'},{l:'PROFILE',i:'◈'}];
function renderTabs(){document.getElementById('tabbar').innerHTML=TABS.map(function(t,i){return'<button class="tab'+(APP.tab===i?' active':'')+'" onclick="switchTab('+i+')">'+t.i+' '+t.l+'</button>';}).join('');}
function switchTab(i){APP.tab=i;APP.filter=null;renderTabs();renderContent();}
function todayScreen(){var tj=APP.jobs.filter(function(j){return j.date===today});var installed=window.matchMedia('(display-mode: standalone)').matches;var banner=installed?'':'<div class="ibanner"><div style="font-size:22px">📲</div><div><div style="color:#00E5FF;font-size:11px;font-weight:700;margin-bottom:2px">INSTALL ON YOUR PHONE</div><div style="color:#8AAABB;line-height:1.5">Browser menu → <b style="color:#FFD166">Add to Home Screen</b></div></div></div>';var btnHtml=APP.running?'<button class="run-btn" disabled><span class="spin">◎</span> Searching…</button>':'<button class="run-btn" onclick="runAgent()">▶ Run Agent</button>';var jobsHtml=tj.length===0?'<div style="text-align:center;padding:40px;color:#5A7A8A"><div style="font-size:30px;margin-bottom:8px">◎</div>Tap Run Agent to find today\'s roles</div>':tj.map(jobHtml).join('');return'<div class="fade">'+banner+'<div class="agent-box"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="color:#00E5FF;font-size:10px;letter-spacing:2px;margin-bottom:3px">DAILY AGENT</div><div style="color:#E8F4F8;font-size:15px;font-weight:800">Run Today\'s Search</div><div style="color:#5A7A8A;font-size:11px;margin-top:2px">Bay Area · $2M+ · Exec roles</div></div>'+btnHtml+'</div>'+(APP.logs.length?'<div class="log" id="aglog" style="display:block">'+APP.logs.map(function(l){return'<div style="color:'+(l[0]==='✦'?'#00E5FF':l[0]==='⚠'?'#FFA552':'#8AAABB')+'">'+l+'</div>';}).join('')+'</div>':'')+'</div>'+statsHtml()+'<div class="section-lbl">TODAY · '+tj.length+' ROLES FOUND</div>'+jobsHtml+'</div>';}
function runAgent(){if(APP.running)return;APP.running=true;APP.logs=[];renderContent();var steps=[{m:'Connecting to job sources…',d:700},{m:'Scanning LinkedIn for $2M+ exec roles…',d:1200},{m:'Scanning Levels.fyi & Glassdoor…',d:900},{m:'Filtering Bay Area locations…',d:600},{m:'Resolving key contacts via AI…',d:1300},{m:'Found 3 new matching roles!',d:500},{m:'✦ Agent run complete.',d:400}];var i=0;function next(){if(i>=steps.length){callAI();return;}var s=steps[i++];setTimeout(function(){APP.logs.push(s.m);var el=document.getElementById('aglog');if(el){el.style.display='block';el.innerHTML=APP.logs.map(function(l){return'<div style="color:'+(l[0]==='✦'?'#00E5FF':l[0]==='⚠'?'#FFA552':'#8AAABB')+'">'+l+'</div>';}).join('');el.scrollTop=el.scrollHeight;}next();},s.d);}next();}
function callAI(){fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:'Generate exactly 3 realistic executive job listings for Bay Area tech companies with $2M+ total comp. Roles must be VP/SVP/C-Suite. Respond ONLY with valid JSON array, no markdown. Each object needs: title, company, comp (like "$2.5M"), location (SF Bay Area city), source (LinkedIn/Levels.fyi/Glassdoor), tags (array 3 strings), cn (contact name), cr (contact role), summary (2 sentences). Use real Bay Area tech companies.'}]})}).then(function(r){return r.json();}).then(function(data){var text=(data.content&&data.content[0]&&data.content[0].text)||'[]';var clean=text.replace(/```json|```/g,'').trim();var roles=JSON.parse(clean);var newJ=roles.map(function(r,i){return{id:Date.now()+i,date:today,status:'new',title:r.title,company:r.company,comp:r.comp,location:r.location,source:r.source,tags:r.tags,cn:r.cn,cr:r.cr,cl:'linkedin.com/in/'+(r.cn||'').toLowerCase().replace(/\s/g,'-'),summary:r.summary,cv:false,lt:false,notes:''};});APP.jobs=newJ.concat(APP.jobs);save();APP.running=false;renderContent();}).catch(function(){APP.logs.push('⚠ AI unavailable — showing cached roles.');APP.running=false;renderContent();});}
function historyScreen(){var past=APP.jobs.filter(function(j){return j.date!==today});var filtered=APP.filter?past.filter(function(j){return j.status===APP.filter}):past;var groups={};filtered.forEach(function(j){(groups[j.date]=groups[j.date]||[]).push(j);});var sorted=Object.keys(groups).sort(function(a,b){return b>a?1:-1;});var pillsHtml='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px"><button class="pill" style="'+(APP.filter?'':'background:#00E5FF18;color:#00E5FF;border-color:#00E5FF50')+'" onclick="setF(null)">All</button>'+Object.keys(ST).map(function(k){var m=ST[k];return'<button class="pill" style="'+(APP.filter===k?'background:'+m.c+'18;color:'+m.c+';border-color:'+m.c+'50':'')+'" onclick="setF(\''+k+'\')">'+m.l+'</button>';}).join('')+'</div>';var cardsHtml=filtered.length===0?'<div style="color:#5A7A8A;text-align:center;padding:30px">No roles found</div>':sorted.map(function(d){return'<div class="section-lbl">'+fdate(d)+' · '+groups[d].length+' ROLES</div>'+groups[d].map(jobHtml).join('');}).join('');return'<div class="fade">'+pillsHtml+cardsHtml+'</div>';}
function setF(s){APP.filter=s;renderContent();}
function pipelineScreen(){var stages=Object.keys(ST);return'<div class="fade">'+statsHtml()+stages.map(function(s){var m=ST[s];var list=APP.jobs.filter(function(j){return j.status===s;});return'<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid #1E2D3D;margin-bottom:8px"><span style="color:'+m.c+';font-size:14px">'+m.i+'</span><span style="color:'+m.c+';font-size:12px;font-weight:700">'+m.l.toUpperCase()+'</span><span style="background:'+m.c+'22;color:'+m.c+';border-radius:20px;padding:1px 8px;font-size:11px">'+list.length+'</span></div>'+(list.length===0?'<div style="color:#5A7A8A;font-size:12px;padding-left:4px">No roles here</div>':list.map(jobHtml).join(''))+'</div>';}).join('')+'</div>';}
function profileScreen(){return'<div class="fade"><div class="card"><div style="color:#00E5FF;font-size:10px;letter-spacing:2px;margin-bottom:14px">MY PROFILE</div><div style="color:#5A7A8A;font-size:10px;letter-spacing:1px;margin-bottom:6px">FULL NAME</div><input type="text" id="pname" value="'+APP.profile.name+'" placeholder="Your Name" style="margin-bottom:14px"><div style="color:#5A7A8A;font-size:10px;letter-spacing:1px;margin-bottom:6px">PROFESSIONAL BIO</div><textarea id="pbio" rows="6" placeholder="Senior tech executive with 15+ years…">'+APP.profile.bio+'</textarea><button onclick="saveProf()" id="savebtn" style="width:100%;margin-top:12px;padding:11px;background:#00E5FF18;color:#00E5FF;border:1px solid #00E5FF40;border-radius:8px;font-size:13px;font-weight:700">Save Profile</button></div><div class="card"><div style="color:#FFD166;font-size:10px;letter-spacing:2px;margin-bottom:12px">SEARCH CRITERIA</div><div style="color:#E8F4F8;font-size:12px;line-height:2.2">📍 Bay Area, California<br>💰 Minimum $2M total comp<br>🏢 Tech companies (AI, Fintech, SaaS)<br>🎯 VP / SVP / C-Suite / Director<br>🔍 LinkedIn · Levels.fyi · Glassdoor</div></div></div>';}
function saveProf(){APP.profile.name=document.getElementById('pname').value;APP.profile.bio=document.getElementById('pbio').value;save();var b=document.getElementById('savebtn');b.textContent='✓ Saved!';b.style.color='#06D6A0';b.style.borderColor='#06D6A040';setTimeout(function(){b.textContent='Save Profile';b.style.color='#00E5FF';b.style.borderColor='#00E5FF40';},2000);}
function renderContent(){var c=document.getElementById('content');if(APP.tab===0)c.innerHTML=todayScreen();else if(APP.tab===1)c.innerHTML=historyScreen();else if(APP.tab===2)c.innerHTML=pipelineScreen();else c.innerHTML=profileScreen();}
function openJob(id){APP.selId=id;renderDetail();document.getElementById('detail').style.display='block';}
function closeDetail(){document.getElementById('detail').style.display='none';renderContent();}
function renderDetail(){var j=getJob(APP.selId);if(!j)return;var m=ST[j.status]||ST.new;var pills=Object.keys(ST).map(function(k){var m2=ST[k];return'<button class="pill" style="'+(j.status===k?'background:'+m2.c+'18;color:'+m2.c+';border-color:'+m2.c+'50':'')+'" onclick="updStatus(\''+k+'\')">'+m2.i+' '+m2.l+'</button>';}).join('');document.getElementById('detail').innerHTML='<div class="dbar"><button class="back" onclick="closeDetail()">←</button><div style="flex:1"><div style="color:#00E5FF;font-size:10px;letter-spacing:1px">ROLE DETAIL</div><div style="color:#E8F4F8;font-size:14px;font-weight:700">'+j.company+'</div></div>'+sbadge(j.status)+'</div><div style="padding:12px 12px 100px"><div class="card"><div style="color:#E8F4F8;font-size:18px;font-weight:800;margin-bottom:4px">'+j.title+'</div><div style="color:#8AAABB;font-size:12px;margin-bottom:10px">'+j.company+' · '+j.location+'</div><span class="comp">'+j.comp+' TC</span><div style="margin-top:10px">'+j.tags.map(function(t){return'<span class="tag">'+t+'</span>';}).join('')+'</div><div style="color:#8AAABB;font-size:12px;margin-top:12px;line-height:1.7">'+j.summary+'</div></div><div class="card"><div style="color:#5A7A8A;font-size:10px;letter-spacing:1px;margin-bottom:10px">KEY CONTACT</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="width:42px;height:42px;border-radius:10px;background:#00E5FF18;border:1px solid #00E5FF35;display:flex;align-items:center;justify-content:center;color:#00E5FF;font-size:17px;font-weight:800;flex-shrink:0">'+j.cn[0]+'</div><div><div style="color:#E8F4F8;font-size:14px;font-weight:700">'+j.cn+'</div><div style="color:#5A7A8A;font-size:12px">'+j.cr+'</div></div></div><div style="background:#0E1419;border-radius:8px;padding:8px 10px;color:#00E5FF;font-size:11px">🔗 '+j.cl+'</div></div><div class="card"><div style="color:#5A7A8A;font-size:10px;letter-spacing:1px;margin-bottom:10px">UPDATE STATUS</div><div>'+pills+'</div></div><div class="card"><div style="color:#5A7A8A;font-size:10px;letter-spacing:1px;margin-bottom:10px">AI TOOLS</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button onclick="openAI(\'cv\')" style="padding:9px 14px;background:'+(j.cv?'#06D6A018':'#00E5FF18')+';color:'+(j.cv?'#06D6A0':'#00E5FF')+';border:1px solid '+(j.cv?'#06D6A040':'#00E5FF40')+';border-radius:8px;font-size:12px;font-weight:600">◈ '+(j.cv?'CV Optimized ✓':'Optimize CV')+'</button><button onclick="openAI(\'lt\')" style="padding:9px 14px;background:'+(j.lt?'#06D6A018':'#FFD16618')+';color:'+(j.lt?'#06D6A0':'#FFD166')+';border:1px solid '+(j.lt?'#06D6A040':'#FFD16640')+';border-radius:8px;font-size:12px;font-weight:600">✉ '+(j.lt?'Letter Ready ✓':'Write Intro Letter')+'</button></div></div><div class="card"><div style="color:#5A7A8A;font-size:10px;letter-spacing:1px;margin-bottom:8px">NOTES & FOLLOW-UP</div><textarea id="jnotes" rows="4" placeholder="Follow-up reminders, contacts, deadlines…">'+j.notes+'</textarea><button onclick="saveNotes()" style="margin-top:10px;padding:8px 16px;background:#00E5FF18;color:#00E5FF;border:1px solid #00E5FF40;border-radius:8px;font-size:12px;font-weight:600">Save Note</button></div></div>';}
function updStatus(s){var j=getJob(APP.selId);if(!j)return;j.status=s;APP.jobs=APP.jobs.map(function(jj){return jj.id===APP.selId?j:jj;});save();renderDetail();}
function saveNotes(){var j=getJob(APP.selId);if(!j)return;j.notes=document.getElementById('jnotes').value;APP.jobs=APP.jobs.map(function(jj){return jj.id===APP.selId?j:jj;});save();var b=event.target;b.textContent='✓ Saved!';b.style.color='#06D6A0';setTimeout(function(){b.textContent='Save Note';b.style.color='#00E5FF';},1500);}
function openAI(mode){var j=getJob(APP.selId);if(!j)return;APP.aiMode=mode;var isCv=mode==='cv';var mc=isCv?'#00E5FF':'#FFD166';document.getElementById('mhead').innerHTML='<div><div style="color:'+mc+';font-size:10px;letter-spacing:1px;margin-bottom:2px">'+(isCv?'◈ CV OPTIMIZER':'✉ INTRO LETTER')+'</div><div style="color:#E8F4F8;font-size:14px;font-weight:700">'+j.title+'</div><div style="color:#5A7A8A;font-size:12px">'+j.company+'</div></div><button onclick="closeModal()" style="background:#1E2D3D;color:#8AAABB;border-radius:8px;width:30px;height:30px;font-size:13px">✕</button>';document.getElementById('mbody').innerHTML='<div style="text-align:center;padding:40px"><div class="spin" style="color:#00E5FF;font-size:26px">◎</div><div style="color:#5A7A8A;font-size:13px;margin-top:10px">Claude is tailoring your content…</div></div>';document.getElementById('mfoot').innerHTML='';document.getElementById('modal').style.display='flex';var bio=APP.profile.bio||'Senior tech executive with 15+ years leading engineering organizations at scale.';var prompt=isCv?'You are an executive career coach. Role: '+j.title+' at '+j.company+' ('+j.comp+'). Job: '+j.summary+'. Background: '+bio+'. Write 5 powerful CV bullet points for this role. Metrics-driven, executive-level. Use numbered list.':'You are an executive career coach. Write a compelling 3-paragraph intro letter. Role: '+j.title+' at '+j.company+'. Contact: '+j.cn+', '+j.cr+'. Job: '+j.summary+'. Background: '+bio+'. Sharp, confident, tailored. First line must be a hook.';fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:prompt}]})}).then(function(r){return r.json();}).then(function(data){var text=(data.content&&data.content[0]&&data.content[0].text)||'No response.';document.getElementById('mbody').textContent=text;document.getElementById('mfoot').innerHTML='<button onclick="cpyAI()" style="padding:8px 14px;background:#00E5FF18;color:#00E5FF;border:1px solid #00E5FF40;border-radius:8px;font-size:12px;font-weight:600">⎘ Copy</button><button onclick="doneAI()" style="padding:8px 14px;background:#06D6A018;color:#06D6A0;border:1px solid #06D6A040;border-radius:8px;font-size:12px;font-weight:600">✓ Done</button>';}).catch(function(){document.getElementById('mbody').textContent='⚠ Could not connect. Check your internet.';});}
function closeModal(){document.getElementById('modal').style.display='none';}
function cpyAI(){var t=document.getElementById('mbody').textContent;if(navigator.clipboard)navigator.clipboard.writeText(t);}
function doneAI(){var j=getJob(APP.selId);if(!j)return;if(APP.aiMode==='cv')j.cv=true;else j.lt=true;APP.jobs=APP.jobs.map(function(jj){return jj.id===APP.selId?j:jj;});save();closeModal();renderDetail();}

unction(e){e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request)}))})';var sb=new Blob([sw],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(sb)).catch(function(){});}}
